---
- name: Installer WinZip Mac Edition
  hosts: localhost
  connection: local
  vars:
    dmg_path: "{{ ansible_env.HOME }}/Downloads/winzipmacedition50.dmg"
  
  tasks:
    - name: Vérifier et monter DMG
      command: "hdiutil attach {{ dmg_path }}"
      register: mount_result
      ignore_errors: no
    
    - name: Copier l'application
      shell: |
        VOLUME=$(echo "{{ mount_result.stdout }}" | grep -o '/Volumes/[^ ]*' | head -1)
        APP=$(find "$VOLUME" -name "*.app" -maxdepth 1 | head -1)
        if [ -n "$APP" ]; then
          cp -R "$APP" /Applications/
          echo "Copied: $APP"
        fi
      register: copy_result
    
    - name: Nettoyer - Démonter
      command: "hdiutil detach {{ mount_result.stdout | regex_search('/Volumes/[^\\n]+') | first }}"
      ignore_errors: yes
    
    - name: Vérifier installation
      stat:
        path: "/Applications/WinZip Mac Edition.app"
      register: installed
    
    - name: Succès
      debug:
        msg: "✅ WinZip Mac Edition installé !"
      when: installed.stat.exists